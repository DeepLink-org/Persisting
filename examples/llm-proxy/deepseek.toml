# persisting 内嵌 LLM 代理 — DeepSeek（OpenAI + Anthropic 双协议）
#
#   export DEEPSEEK_API_KEY=sk-...
#   persisting capture run -o ./store -c examples/llm-proxy/deepseek.toml -f md -- claude
#
# 协议路由（同一 upstream 目标）：
#   /v1/messages          → upstream_anthropic
#   /v1/chat/completions  → upstream
#
# 任意客户端 model 通过 forward 改写为 deepseek-chat 再转发。
#
# capture_level = "dialogue"   # summary | dialogue (default) | full

listen = "127.0.0.1:19081"
admin_listen = "127.0.0.1:9876"
agent_id = "deepseek-proxy"

[[models]]
name = "deepseek-v4-flash"
provider = "openai"
upstream = "https://api.deepseek.com/v1"
upstream_anthropic = "https://api.deepseek.com/anthropic/v1"
api_key_env = "DEEPSEEK_API_KEY"

[[models]]
name = "*"
forward = "deepseek-v4-flash"
